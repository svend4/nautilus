name: Register with Nautilus Portal

# Этот файл предназначен для ЦЕЛЕВЫХ репозиториев.
# Скопируйте его в .github/workflows/ вашего репо.
#
# Срабатывает при изменении nautilus.json в корне вашего репо.
# Отправляет уведомление в svend4/nautilus для авто-регистрации.
#
# Требования:
#   - В корне вашего репо должен быть nautilus.json (см. INTEGRATION.md)
#   - В секретах вашего репо: NAUTILUS_TOKEN (Personal Access Token
#     с правами repo:svend4/nautilus)

on:
  push:
    branches: [main, master]
    paths:
      - "nautilus.json"

  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate nautilus.json

    steps:
      - uses: actions/checkout@v4

      - name: Check nautilus.json exists
        run: |
          if [ ! -f nautilus.json ]; then
            echo "::error::nautilus.json не найден в корне репо"
            echo "Создайте nautilus.json по инструкции:"
            echo "https://github.com/svend4/nautilus/blob/main/INTEGRATION.md"
            exit 1
          fi

      - name: Validate required fields
        run: |
          python3 - <<'EOF'
          import json, sys
          data = json.load(open("nautilus.json"))
          required = ["repo", "format", "native_unit", "compatibility"]
          missing = [k for k in required if k not in data]
          if missing:
              print(f"::error::Отсутствуют обязательные поля: {', '.join(missing)}")
              sys.exit(1)
          compat = data["compatibility"]
          if not (0 <= compat <= 3):
              print("::error::compatibility должен быть от 0 до 3")
              sys.exit(1)
          print(f"✅ nautilus.json валиден: {data['repo']} (compat={compat})")
          EOF

      - name: Show passport info
        run: |
          python3 -c "
          import json
          d = json.load(open('nautilus.json'))
          print('Репозиторий:', d['repo'])
          print('Формат:', d['format'])
          print('Единица:', d['native_unit'])
          compat_labels = {0:'обнаруживаемый',1:'читаемый',2:'связанный',3:'интерактивный'}
          print('Совместимость:', d['compatibility'], '-', compat_labels.get(d['compatibility']))
          print('Описание:', d.get('description','—')[:80])
          index_count = len(d.get('index', []))
          print('Записей в index:', index_count)
          "

  notify:
    runs-on: ubuntu-latest
    needs: validate
    name: Notify Nautilus Portal

    steps:
      - name: Send registration event
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.NAUTILUS_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/svend4/nautilus/dispatches" \
            -d "{\"event_type\":\"nautilus_register\",\"client_payload\":{\"repo\":\"${{ github.repository }}\",\"ref\":\"${{ github.ref }}\"}}"

      - name: Confirm
        run: |
          echo "✅ Уведомление отправлено в svend4/nautilus"
          echo "Репозиторий ${{ github.repository }} будет зарегистрирован автоматически."
